services:
  oracle:
    image: gvenzl/oracle-free:23
    
    container_name: oracle-timecard

    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}

    volumes:
      - oracle-data:/opt/oracle/oradata
    
    restart: unless-stopped

volumes:
  oracle-data: